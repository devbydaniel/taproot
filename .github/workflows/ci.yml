name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prettier --check .
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Duplication (jscpd)
        run: npm run dup
      - name: Dead code and unused dependencies (knip)
        run: npm run knip
      - name: Workspace dependency version mismatches (syncpack)
        run: npx syncpack lint

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitleaks scans commit history
      - name: Secret scan (gitleaks)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
